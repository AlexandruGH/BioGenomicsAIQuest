kind = "web"
previewPath = "/"
title = "AI Quest Bioinformatics"
version = "1.0.0"
id = "artifacts/ai-quest-bio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19015

[services.development]
run = "pnpm --filter @workspace/ai-quest-bio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-quest-bio", "run", "build" ]
publicDir = "artifacts/ai-quest-bio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19015"
BASE_PATH = "/"
